<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家庭訂閱管理</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --oak:        #fafaf8;
  --paper:      #f4f2ee;
  --paper2:     #ece9e2;
  --border:     rgba(44,44,39,0.1);
  --border2:    rgba(44,44,39,0.18);
  --bark-pale:  #f6f2eb;
  --bark-mid:   #d4b896;
  --bark:       #8b673c;
  --bark-dark:  #5c3d1e;
  --moss:       #3d4f3a;
  --moss-pale:  #eef1eb;
  --sage:       #6b7c65;
  --sage-pale:  #d4ddd1;
  --meadow:     #50b050;
  --meadow-pale:#f0faf0;
  --sky:        #3a8daa;
  --sky-pale:   #e8f4f8;
  --sky-dark:   #1e5a72;
  --amber:      #c8820f;
  --amber-pale: #fef8ed;
  --amber-dark: #8a5500;
  --maple:      #c25844;
  --maple-pale: #fdf0ee;
  --maple-dark: #8a2e1e;
  --text:       #2c2c27;
  --text-mid:   #6b6860;
  --text-dim:   #9e9b93;
  --r:          10px;
  --r-lg:       14px;
  --ff:         'Zen Kaku Gothic New', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--oak);color:var(--text);font-family:var(--ff);font-weight:400;min-height:100vh;padding-bottom:60px;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 60% 40% at 8% 12%,rgba(61,79,58,.06) 0%,transparent 60%),
             radial-gradient(ellipse 50% 60% at 90% 85%,rgba(107,124,101,.04) 0%,transparent 55%);}
.wrap{max-width:680px;margin:0 auto;padding:0 16px;position:relative;z-index:1;}

/* HEADER */
header{padding:24px 0 16px;border-bottom:1px solid var(--border);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.eyebrow{font-size:9px;letter-spacing:.28em;color:var(--sage);text-transform:uppercase;font-weight:500;display:flex;align-items:center;gap:6px;}
.eyebrow::before{content:'';width:14px;height:1px;background:var(--sage-pale);}
h1{font-size:clamp(18px,4vw,24px);font-weight:700;color:var(--moss);letter-spacing:-.02em;}
.header-nav{display:flex;gap:6px;flex-shrink:0;}
.nav-btn{background:none;border:1px solid var(--border2);border-radius:8px;padding:7px 13px;font-family:var(--ff);font-size:11.5px;font-weight:500;color:var(--text-mid);cursor:pointer;transition:all .15s;white-space:nowrap;}
.nav-btn:hover{border-color:var(--sage);color:var(--moss);background:var(--moss-pale);}
.nav-btn.active{background:var(--moss);color:white;border-color:var(--moss);}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border-radius:var(--r);overflow:hidden;border:1px solid var(--border);margin-bottom:18px;}
.stat{background:var(--paper);padding:10px 12px;}
.stat-label{font-size:9px;letter-spacing:.18em;color:var(--text-dim);text-transform:uppercase;margin-bottom:4px;font-weight:500;}
.stat-val{font-size:clamp(15px,3.5vw,18px);font-weight:700;color:var(--moss);line-height:1;}
.stat-val small{font-size:9px;color:var(--text-dim);margin-left:2px;font-weight:400;}

/* TABS */
.tab-pane{display:none;}.tab-pane.active{display:block;}

/* SERVICE CARD */
.service-list{display:flex;flex-direction:column;gap:10px;}
.service-card{background:var(--oak);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;animation:fadeUp .2s ease;transition:border-color .15s,box-shadow .15s;position:relative;}
.service-card:hover{border-color:var(--border2);box-shadow:0 2px 12px rgba(0,0,0,.05);}
.service-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:14px 0 0 14px;background:var(--moss);}
.service-card.role-member::before{background:var(--meadow);}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* header split zones */
.svc-header{display:flex;align-items:stretch;min-height:60px;}
.svc-header-main{display:flex;align-items:center;gap:10px;padding:11px 12px 11px 17px;flex:1;cursor:pointer;min-width:0;user-select:none;}
.svc-emoji{width:34px;height:34px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:17px;background:var(--moss-pale);}
.svc-text{min-width:0;}
.svc-name-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.svc-name{font-size:13.5px;font-weight:700;color:var(--bark-dark);line-height:1.2;}
.svc-meta{font-size:10px;color:var(--text-dim);margin-top:2px;}
.svc-header-actions{display:flex;align-items:center;border-left:1px solid var(--border);flex-shrink:0;}
.svc-price-cell{display:flex;flex-direction:column;align-items:flex-end;justify-content:center;padding:0 14px;border-right:1px solid var(--border);gap:1px;}
.svc-price{font-size:13px;font-weight:700;color:var(--moss);}
.svc-price-sub{font-size:9px;color:var(--text-dim);}
.svc-action-btn{display:flex;align-items:center;justify-content:center;width:44px;height:100%;background:transparent;border:none;cursor:pointer;color:var(--text-dim);font-size:13px;transition:background .14s,color .14s;}
.svc-action-btn:hover{background:var(--moss-pale);color:var(--moss);}
.svc-action-btn.danger:hover{background:var(--maple-pale);color:var(--maple);}
.chevron{display:inline-block;transition:transform .22s;}
.service-card.open .chevron{transform:rotate(180deg);}

/* badges */
.my-role-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;letter-spacing:.06em;text-transform:uppercase;flex-shrink:0;}
.mrb-admin {background:var(--moss-pale);color:var(--moss);}
.mrb-member{background:var(--meadow-pale);color:#2e7a2e;}
.debt-pill{font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;background:var(--maple-pale);color:var(--maple);border:1px solid rgba(194,88,68,.18);}

/* CARD BODY */
.svc-body{display:none;border-top:1px solid var(--border);background:var(--paper);padding:12px 14px 14px 17px;}
.service-card.open .svc-body{display:block;}

/* Finance */
.finance-row{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:12px;}
.fin-cell{background:var(--oak);padding:10px 12px;}
.fin-cell.tap{cursor:pointer;transition:background .14s;}
.fin-cell.tap:hover{background:var(--moss-pale);}
.fin-label{font-size:9px;letter-spacing:.16em;color:var(--text-dim);text-transform:uppercase;margin-bottom:3px;font-weight:500;}
.fin-val{font-size:16px;font-weight:700;color:var(--moss);line-height:1.1;}
.fin-val small{font-size:9.5px;color:var(--text-dim);font-weight:400;margin-left:2px;}
.fin-edit{font-size:10px;color:var(--text-dim);margin-left:4px;}
.fin-input{font-size:15px;font-weight:700;color:var(--moss);background:transparent;border:none;border-bottom:1.5px solid var(--sage);font-family:var(--ff);outline:none;width:100%;padding:0 0 2px;}

/* MEMBER CARD */
.members-wrap{display:flex;flex-direction:column;gap:8px;}
.member-card{background:var(--oak);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color .14s;}
.member-card:hover{border-color:var(--border2);}
.member-top{display:grid;align-items:center;gap:8px;padding:10px 12px;grid-template-columns:30px 1fr auto;}
.m-avatar{width:30px;height:30px;border-radius:50%;flex-shrink:0;background:var(--moss-pale);border:1px solid var(--sage-pale);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--moss);font-weight:700;transition:background .14s,border-color .14s;}
.m-avatar.paid  {background:var(--meadow-pale);border-color:rgba(80,176,80,.35);color:#2e7a2e;}
.m-avatar.unpaid{background:var(--maple-pale);border-color:rgba(194,88,68,.35);color:var(--maple);}
.m-name{font-size:13px;font-weight:600;color:var(--bark-dark);}
.m-sub{font-size:10px;color:var(--text-dim);margin-top:1px;}
.pay-status{font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;cursor:pointer;border:1px solid transparent;transition:all .14s;white-space:nowrap;font-family:var(--ff);}
.pay-status.paid  {background:var(--meadow-pale);color:#2e7a2e;border-color:rgba(80,176,80,.3);}
.pay-status.unpaid{background:var(--maple-pale);color:var(--maple);border-color:rgba(194,88,68,.3);}
.pay-status.none  {background:var(--paper2);color:var(--text-dim);border-color:var(--border2);}
.member-dates{display:flex;flex-wrap:wrap;gap:6px;padding:7px 12px;border-top:1px solid var(--border);background:var(--paper);}
.date-chip{display:flex;flex-direction:column;gap:1px;}
.date-chip span{font-size:9px;color:var(--text-dim);}
.date-chip strong{font-size:11px;color:var(--text-mid);font-weight:500;}
.member-btm{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border-top:1px solid var(--border);gap:8px;flex-wrap:wrap;}
.icon-btn{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:6px;background:transparent;border:1px solid var(--border);color:var(--text-dim);cursor:pointer;transition:all .13s;font-size:13px;font-family:var(--ff);flex-shrink:0;}
.icon-btn:hover{border-color:var(--sage);color:var(--moss);background:var(--moss-pale);}
.icon-btn.danger:hover{border-color:var(--maple);color:var(--maple);background:var(--maple-pale);}

/* renew badges */
.renew-badge{font-size:9.5px;font-weight:600;padding:2px 7px;border-radius:20px;white-space:nowrap;}
.rn-soon{background:var(--sky-pale);color:var(--sky-dark);}
.rn-due {background:var(--amber-pale);color:var(--amber-dark);}
.rn-over{background:var(--maple-pale);color:var(--maple);}

/* debt */
.debt-summary{background:var(--amber-pale);border:1px solid rgba(200,130,15,.22);border-radius:var(--r);padding:10px 13px;margin-top:10px;}
.debt-head{font-size:11px;font-weight:700;color:var(--amber-dark);margin-bottom:6px;}
.debt-items{display:flex;flex-wrap:wrap;gap:5px;}
.debt-item{font-size:11px;background:white;border:1px solid rgba(200,130,15,.18);border-radius:5px;padding:3px 9px;color:var(--amber);font-weight:500;}

/* CARD FOOTER */
.card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:10px;margin-top:8px;flex-wrap:wrap;gap:8px;}
.btn-add-member{background:var(--moss-pale);border:1px solid var(--sage-pale);border-radius:6px;color:var(--moss);font-family:var(--ff);font-size:10.5px;font-weight:700;padding:8px 14px;cursor:pointer;transition:all .14s;white-space:nowrap;}
.btn-add-member:hover{background:var(--moss);color:white;}
.msg-btns{display:flex;flex-wrap:wrap;gap:5px;}
.msg-btn{display:inline-flex;align-items:center;gap:4px;background:var(--oak);border:1px solid var(--border);border-radius:5px;padding:7px 11px;font-family:var(--ff);font-size:10.5px;color:var(--text-dim);cursor:pointer;transition:all .13s;font-weight:500;}
.msg-btn:hover{border-color:var(--sage);color:var(--moss);background:var(--moss-pale);}
.msg-btn.copied{border-color:var(--meadow);color:#2e7a2e;}

/* ADD SERVICE */
.btn-add-service{width:100%;margin-top:12px;padding:12px 16px;background:var(--moss);color:white;border:none;border-radius:var(--r-lg);font-family:var(--ff);font-size:12px;font-weight:700;letter-spacing:.1em;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:7px;}
.btn-add-service:hover{background:#2e3d2c;transform:translateY(-1px);box-shadow:0 4px 14px rgba(61,79,58,.15);}
.add-svc-panel{display:none;background:var(--paper);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px;margin-top:12px;animation:fadeUp .18s ease;}
.add-svc-panel.open{display:block;}
.panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.panel-title{font-size:10.5px;letter-spacing:.18em;color:var(--sage);text-transform:uppercase;font-weight:700;}
.panel-divider{font-size:9.5px;letter-spacing:.18em;color:var(--text-dim);text-transform:uppercase;font-weight:600;margin:16px 0 12px;padding-top:14px;border-top:1px solid var(--border);}

/* SETTINGS */
.settings-section{margin-bottom:22px;}
.settings-title{font-size:10.5px;letter-spacing:.18em;color:var(--sage);text-transform:uppercase;font-weight:700;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.settings-card{background:var(--paper);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;}

/* FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:11px;}
.field:last-child{margin-bottom:0;}
.field.full{grid-column:1/-1;}
label{font-size:9.5px;letter-spacing:.17em;color:var(--text-mid);text-transform:uppercase;font-weight:500;}
input,select,textarea{background:var(--oak);border:1px solid var(--border);border-radius:5px;padding:9px 11px;font-family:var(--ff);font-size:13px;color:var(--text);outline:none;transition:border-color .14s,box-shadow .14s;-webkit-appearance:none;width:100%;}
input:focus,select:focus,textarea:focus{border-color:var(--sage);box-shadow:0 0 0 3px rgba(107,124,101,.1);}
input::placeholder,textarea::placeholder{color:var(--text-dim);}
textarea{resize:vertical;min-height:90px;line-height:1.7;}
select option{background:white;}
input[type="date"]::-webkit-calendar-picker-indicator{opacity:.38;cursor:pointer;}
.hint{font-size:10px;color:var(--text-dim);line-height:1.6;margin-top:3px;}
.hint code{background:var(--paper2);border-radius:3px;padding:1px 4px;font-family:monospace;font-size:9.5px;color:var(--bark);}

/* segment */
.seg{display:flex;border:1px solid var(--border2);border-radius:6px;overflow:hidden;background:var(--oak);}
.seg-opt{flex:1;padding:8px 6px;text-align:center;font-family:var(--ff);font-size:12px;font-weight:500;color:var(--text-dim);cursor:pointer;transition:background .14s,color .14s;letter-spacing:.04em;user-select:none;border-right:1px solid var(--border2);}
.seg-opt:last-child{border-right:none;}
.seg-opt.active{background:var(--moss);color:white;}
.seg-opt:not(.active):hover{background:var(--moss-pale);color:var(--moss);}

.btn-primary{width:100%;padding:10px 16px;background:var(--moss);color:white;border:none;border-radius:6px;font-family:var(--ff);font-size:11.5px;font-weight:700;letter-spacing:.1em;cursor:pointer;transition:all .14s;margin-top:4px;}
.btn-primary:hover{background:#2e3d2c;}
.btn-save{padding:9px 18px;background:var(--moss);color:white;border:none;border-radius:6px;font-family:var(--ff);font-size:11.5px;font-weight:700;letter-spacing:.08em;cursor:pointer;transition:all .14s;}
.btn-save:hover{background:#2e3d2c;}
.btn-secondary{padding:9px 14px;background:var(--paper2);color:var(--text-mid);border:1px solid var(--border);border-radius:6px;font-family:var(--ff);font-size:11.5px;font-weight:500;cursor:pointer;transition:all .14s;}
.btn-secondary:hover{border-color:var(--border2);color:var(--text);}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(44,44,39,.3);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(3px);padding:16px;}
.modal-bg.open{display:flex;}
.modal-box{background:var(--oak);border-radius:var(--r-lg);padding:22px 20px;max-width:440px;width:100%;max-height:90vh;overflow-y:auto;animation:fadeUp .18s ease;}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.modal-title{font-size:13.5px;font-weight:700;color:var(--moss);}
.modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--text-dim);padding:2px 6px;}
.modal-close:hover{color:var(--text);}
.modal-divider{font-size:9.5px;letter-spacing:.18em;color:var(--text-dim);text-transform:uppercase;font-weight:500;margin:14px 0 10px;padding-top:12px;border-top:1px solid var(--border);grid-column:1/-1;}

/* pay modal */
.pay-choice{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.pay-option-btn{display:flex;align-items:center;gap:12px;padding:13px 16px;border-radius:var(--r);border:1.5px solid var(--border);background:var(--oak);cursor:pointer;transition:all .15s;text-align:left;width:100%;font-family:var(--ff);}
.pay-option-btn:hover{border-color:var(--sage);background:var(--moss-pale);}
.pay-option-btn.sel-paid  {border-color:var(--meadow);background:var(--meadow-pale);}
.pay-option-btn.sel-unpaid{border-color:var(--maple);background:var(--maple-pale);}
.po-icon{font-size:20px;flex-shrink:0;}
.po-title{font-size:13px;font-weight:700;color:var(--text);}
.po-desc{font-size:10.5px;color:var(--text-dim);margin-top:2px;}

/* ICS */
.ics-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:14px;}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;border:1px dashed var(--border2);border-radius:var(--r-lg);color:var(--text-dim);}
.empty-art{font-size:26px;margin-bottom:10px;opacity:.38;}
.empty p{font-size:12.5px;line-height:1.8;}

/* TOAST */
.toast{position:fixed;bottom:22px;right:16px;background:var(--moss);color:rgba(255,255,255,.92);border-radius:8px;padding:9px 16px;font-size:11.5px;font-weight:500;letter-spacing:.04em;z-index:999;opacity:0;transform:translateY(6px);transition:all .18s;pointer-events:none;box-shadow:0 4px 16px rgba(61,79,58,.22);}
.toast.show{opacity:1;transform:translateY(0);}

@media(max-width:480px){
  .form-grid,.ics-grid{grid-template-columns:1fr;}
  .field.full{grid-column:1;}
  header{flex-wrap:wrap;}
}
</style>
</head>
<body>
<div class="wrap">

<header>
  <div>
    <div class="eyebrow">Family Subscription</div>
    <h1>家庭訂閱管理</h1>
  </div>
  <nav class="header-nav">
    <button class="nav-btn active" onclick="switchTab('services',this)">訂閱項目</button>
    <button class="nav-btn" onclick="switchTab('settings',this)">設定</button>
  </nav>
</header>

<div class="stats-row">
  <div class="stat"><div class="stat-label">訂閱項目</div><div class="stat-val" id="st-services">0<small> 項</small></div></div>
  <div class="stat"><div class="stat-label">每月費用</div><div class="stat-val" id="st-monthly">0<small> 元</small></div></div>
  <div class="stat"><div class="stat-label">年度總計</div><div class="stat-val" id="st-annual">0<small> 元</small></div></div>
</div>

<div id="tab-services" class="tab-pane active">
  <div id="service-list" class="service-list"></div>
  <button class="btn-add-service" onclick="toggleAddPanel()">
    <span id="add-btn-icon">＋</span> 新增訂閱項目
  </button>
  <div class="add-svc-panel" id="add-svc-panel">
    <div class="panel-head">
      <div class="panel-title">🌿 新增訂閱項目</div>
      <button class="modal-close" onclick="toggleAddPanel()">✕</button>
    </div>
    <!-- Service fields -->
    <div class="form-grid">
      <div class="field full">
        <label>選擇預設服務</label>
        <select id="inp-preset" onchange="applyPreset()">
          <option value="">── 選擇或自行填寫 ──</option>
          <optgroup label="Apple">
            <option value="a1" data-emoji="🍎" data-price="345" data-cycle="monthly">Apple One 家庭方案</option>
            <option value="a2" data-emoji="🎵" data-price="190" data-cycle="monthly">Apple Music 家庭</option>
            <option value="a3" data-emoji="📺" data-price="130" data-cycle="monthly">Apple TV+</option>
            <option value="a4" data-emoji="☁️" data-price="90"  data-cycle="monthly">iCloud+ 200GB 家庭</option>
            <option value="a5" data-emoji="☁️" data-price="330" data-cycle="monthly">iCloud+ 2TB 家庭</option>
          </optgroup>
          <optgroup label="影音串流">
            <option value="v1" data-emoji="🎬" data-price="390" data-cycle="monthly">Netflix 標準 4K</option>
            <option value="v2" data-emoji="▶️" data-price="429" data-cycle="monthly">YouTube Premium 家庭</option>
            <option value="v3" data-emoji="✨" data-price="270" data-cycle="monthly">Disney+</option>
            <option value="v4" data-emoji="📦" data-price="199" data-cycle="yearly">Amazon Prime（年繳）</option>

<script>
const DEFAULT_TEMPLATE=`嗨 {name}！提醒你「{service}」訂閱費用繳費通知 🌿

• 月費金額：NT$ {monthly}
• 下次續費：{renew}（還有 {days} 天）

請記得在到期前完成轉帳，謝謝你！`;

let data    =JSON.parse(localStorage.getItem('sub_v9')||'{"services":[]}');
let settings=JSON.parse(localStorage.getItem('sub_cfg4')||'{}');
if(!settings.msgTemplate)settings.msgTemplate=DEFAULT_TEMPLATE;

/* inline members while adding a new service */
let _inlineMembers=[];

function save(){localStorage.setItem('sub_v9',JSON.stringify(data));}
function saveCfg(){localStorage.setItem('sub_cfg4',JSON.stringify(settings));}

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2200);
}
function todayStr(){return new Date().toISOString().slice(0,10);}
function addMonths(s,n){const d=new Date(s);d.setMonth(d.getMonth()+n);return d.toISOString().slice(0,10);}
function addYears(s,n) {const d=new Date(s);d.setFullYear(d.getFullYear()+n);return d.toISOString().slice(0,10);}
function formatDate(s){if(!s)return'—';const[y,m,d]=s.split('-');return`${y}/${m}/${d}`;}
function daysUntil(s){if(!s)return null;const t=new Date();t.setHours(0,0,0,0);return Math.round((new Date(s)-t)/86400000);}

function renewInfo(s){
  const d=daysUntil(s);
  if(d===null)return{txt:null,cls:''};
  if(d<0)     return{txt:`逾期 ${Math.abs(d)} 天`,cls:'rn-over'};
  if(d<=14)   return{txt:`${d} 天後續訂`,cls:'rn-due'};
  return{txt:`${d} 天後續訂`,cls:'rn-soon'};
}

function monthlyAdminAmt(svc){
  const p=parseFloat(svc.price)||0;
  return svc.adminCycle==='yearly'?p/12:p;
}
function myShareMonthly(svc){
  const s=parseFloat(svc.share);
  const base=(!isNaN(s)&&s>0)?s:(parseFloat(svc.price)||0);
  return svc.adminCycle==='yearly'?base/12:base;
}
function memberPayAmt(svc,m){
  const adminM=monthlyAdminAmt(svc);
  const ms=parseFloat(m.share);
  const base=(!isNaN(ms)&&ms>0)?ms:adminM;
  return m.cycle==='yearly'?base*12:base;
}

/* SEGMENT */
function pickSeg(el,groupId){
  document.querySelectorAll(`#${groupId} .seg-opt`).forEach(o=>o.classList.remove('active'));
  el.classList.add('active');
}
function segVal(groupId){
  const el=document.querySelector(`#${groupId} .seg-opt.active`);
  return el?.dataset.val||el?.dataset.role||'';
}

/* TABS */
function switchTab(id,btn){
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
}

/* SETTINGS */
function loadSettingsUI(){document.getElementById('msg-template').value=settings.msgTemplate;}
function saveMsgTemplate(){settings.msgTemplate=document.getElementById('msg-template').value;saveCfg();toast('訊息範本已儲存 ✓');}
function resetMsgTemplate(){settings.msgTemplate=DEFAULT_TEMPLATE;document.getElementById('msg-template').value=DEFAULT_TEMPLATE;saveCfg();toast('已恢復預設');}

/* ICS */
function icsDate(s){return new Date(s).toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';}
function exportICS(){
  const days=parseInt(document.getElementById('ics-days').value);
  const scope=document.getElementById('ics-scope').value;
  const lines=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//家庭訂閱管理//ZH','CALSCALE:GREGORIAN','METHOD:PUBLISH'];
  let count=0;
  data.services.forEach(svc=>{
    if(svc.renew&&(scope==='all'||scope==='renew')){
      const m=Math.round(monthlyAdminAmt(svc));
      lines.push('BEGIN:VEVENT',`UID:svc-${svc.id}@sub`,`DTSTAMP:${icsDate(todayStr())}`,
        `DTSTART;VALUE=DATE:${svc.renew.replace(/-/g,'')}`,`DTEND;VALUE=DATE:${svc.renew.replace(/-/g,'')}`,
        `SUMMARY:💳 ${svc.name} 續費`,`DESCRIPTION:${svc.name}\\nNT$ ${m}`,
        `BEGIN:VALARM\r\nTRIGGER:-P${days}D\r\nACTION:DISPLAY\r\nDESCRIPTION:${svc.name} 即將到期\r\nEND:VALARM`,
        'END:VEVENT');count++;
    }
    (svc.members||[]).forEach(mb=>{
      if(!mb.renew)return;
      lines.push('BEGIN:VEVENT',`UID:mbr-${mb.id}@sub`,`DTSTAMP:${icsDate(todayStr())}`,
        `DTSTART;VALUE=DATE:${mb.renew.replace(/-/g,'')}`,`DTEND;VALUE=DATE:${mb.renew.replace(/-/g,'')}`,
        `SUMMARY:🌿 ${mb.name}｜${svc.name} 繳費`,`DESCRIPTION:${svc.name}\\n${mb.name}`,
        `BEGIN:VALARM\r\nTRIGGER:-P${days}D\r\nACTION:DISPLAY\r\nDESCRIPTION:提醒 ${mb.name} 繳交 ${svc.name}\r\nEND:VALARM`,
        'END:VEVENT');count++;
    });
  });
  if(!count){toast('沒有可匯出的事件');return;}
  lines.push('END:VCALENDAR');
  const blob=new Blob([lines.join('\r\n')],{type:'text/calendar;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='家庭訂閱.ics';a.click();
  toast(`✓ 已匯出 ${count} 個事件`);
}

/* FORM HELPERS */
function applyPreset(){
  const sel=document.getElementById('inp-preset');
  const opt=sel.options[sel.selectedIndex];
  if(!opt.value)return;
  document.getElementById('inp-svc-name').value =opt.text;
  document.getElementById('inp-svc-emoji').value=opt.dataset.emoji||'📌';
  document.getElementById('inp-svc-price').value=opt.dataset.price||'';
  const cycle=opt.dataset.cycle||'monthly';
  document.querySelectorAll('#svc-admin-cycle .seg-opt').forEach(o=>o.classList.toggle('active',o.dataset.val===cycle));
  updateShareHint();
}
function updateShareHint(){
  const price=parseFloat(document.getElementById('inp-svc-price').value)||0;
  const mc=segVal('svc-member-cycle');
  const ac=segVal('svc-admin-cycle');
  if(!price){document.getElementById('share-hint').textContent='';return;}
  const monthly=ac==='yearly'?price/12:price;
  const shown=mc==='yearly'?Math.round(monthly*12):Math.round(monthly);
  document.getElementById('share-hint').textContent=`自動計算：NT$ ${shown} / ${mc==='yearly'?'年':'月'}`;
}

/* INLINE MEMBERS (add service panel) */
function renderInlineMembers(){
  const wrap=document.getElementById('inline-members-list');
  if(!_inlineMembers.length){wrap.innerHTML='';return;}
  wrap.innerHTML=_inlineMembers.map((m,i)=>`
    <div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--oak);border:1px solid var(--border);border-radius:8px;margin-bottom:6px">
      <div style="width:26px;height:26px;border-radius:50%;background:var(--moss-pale);border:1px solid var(--sage-pale);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--moss);font-weight:700;flex-shrink:0">${m.name.slice(0,1)}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;font-weight:600;color:var(--bark-dark)">${m.name}</div>
        <div style="font-size:10px;color:var(--text-dim)">${m.cycle==='yearly'?'年繳':'月繳'}${m.share?' · NT$'+m.share:''}</div>
      </div>
      <button class="icon-btn danger" onclick="removeInlineMember(${i})" title="移除">✕</button>
    </div>`).join('');
}
function addInlineMember(){
  const name=prompt('成員姓名：');
  if(!name||!name.trim())return;
  _inlineMembers.push({id:Date.now()+Math.random(),name:name.trim(),cycle:segVal('svc-member-cycle')||'monthly',share:'',join:todayStr(),expire:'',renew:'',lastpaid:'',note:'',paid:null});
  renderInlineMembers();
}
function removeInlineMember(i){
  _inlineMembers.splice(i,1);
  renderInlineMembers();
}

function toggleAddPanel(){
  const p=document.getElementById('add-svc-panel');
  const i=document.getElementById('add-btn-icon');
  const opening=!p.classList.contains('open');
  p.classList.toggle('open');
  i.textContent=opening?'✕':'＋';
  if(opening){_inlineMembers=[];renderInlineMembers();}
}

/* ADD SERVICE */
function addService(){
  const name      =document.getElementById('inp-svc-name').value.trim();
  const emoji     =document.getElementById('inp-svc-emoji').value.trim()||'📌';
  const price     =document.getElementById('inp-svc-price').value.trim();
  const share     =document.getElementById('inp-svc-share').value.trim();
  const adminCycle=segVal('svc-admin-cycle');
  const memberCycle=segVal('svc-member-cycle');
  const myRole    =segVal('svc-role-pick');
  const start     =document.getElementById('inp-svc-start').value;
  const renew     =document.getElementById('inp-svc-renew').value;
  const note      =document.getElementById('inp-svc-note').value.trim();
  if(!name||!price){toast('請填寫服務名稱和費用');return;}
  data.services.push({
    id:Date.now(),name,emoji,price,share,adminCycle,memberCycle,
    myRole:myRole||'admin',start:start||todayStr(),renew,note,
    members:_inlineMembers.map(m=>({...m,id:Date.now()+Math.random()}))
  });
  save();render();toast(`✓ 已建立「${name}」`);
  ['inp-svc-name','inp-svc-emoji','inp-svc-price','inp-svc-share','inp-svc-renew','inp-svc-start','inp-svc-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('inp-preset').value='';
  document.getElementById('share-hint').textContent='';
  ['svc-admin-cycle','svc-member-cycle'].forEach(g=>document.querySelectorAll(`#${g} .seg-opt`).forEach((o,i)=>o.classList.toggle('active',i===0)));
  document.querySelectorAll('#svc-role-pick .seg-opt').forEach((o,i)=>o.classList.toggle('active',i===0));
  _inlineMembers=[];
  toggleAddPanel();
}

/* EDIT SERVICE */
let _editSvcId=null;
function openEditService(svcId){
  _editSvcId=svcId;
  const svc=data.services.find(x=>x.id===svcId);if(!svc)return;
  document.getElementById('edit-svc-name').value  =svc.name||'';
  document.getElementById('edit-svc-emoji').value =svc.emoji||'';
  document.getElementById('edit-svc-price').value =svc.price||'';
  document.getElementById('edit-svc-share').value =svc.share||'';
  document.getElementById('edit-svc-renew').value =svc.renew||'';
  document.getElementById('edit-svc-start').value =svc.start||'';
  document.getElementById('edit-svc-note').value  =svc.note||'';
  ['edit-role-pick','edit-admin-cycle','edit-member-cycle'].forEach(g=>{
    const field=g==='edit-role-pick'?'myRole':g==='edit-admin-cycle'?'adminCycle':'memberCycle';
    const val=svc[field]||'';
    document.querySelectorAll(`#${g} .seg-opt`).forEach(o=>o.classList.toggle('active',
      (o.dataset.val||o.dataset.role)===val));
  });
  document.getElementById('modal-edit-svc').classList.add('open');
}
function saveEditService(){
  const svc=data.services.find(x=>x.id===_editSvcId);if(!svc)return;
  svc.name       =document.getElementById('edit-svc-name').value.trim();
  svc.emoji      =document.getElementById('edit-svc-emoji').value.trim()||'📌';
  svc.price      =document.getElementById('edit-svc-price').value.trim();
  svc.share      =document.getElementById('edit-svc-share').value.trim();
  svc.renew      =document.getElementById('edit-svc-renew').value;
  svc.start      =document.getElementById('edit-svc-start').value;
  svc.note       =document.getElementById('edit-svc-note').value.trim();
  svc.myRole     =segVal('edit-role-pick');
  svc.adminCycle =segVal('edit-admin-cycle');
  svc.memberCycle=segVal('edit-member-cycle');
  save();render();
  document.getElementById('modal-edit-svc').classList.remove('open');
  toast(`已更新「${svc.name}」`);
  setTimeout(()=>{const c=document.querySelector(`.service-card[data-id="${_editSvcId}"]`);if(c)c.classList.add('open');},50);
}

function deleteService(id){
  const s=data.services.find(x=>x.id===id);
  if(!s||!confirm(`確定刪除「${s.name}」嗎？`))return;
  data.services=data.services.filter(x=>x.id!==id);
  save();render();toast(`已刪除 ${s.name}`);
}
function toggleCard(id){
  const c=document.querySelector(`.service-card[data-id="${id}"]`);
  if(c)c.classList.toggle('open');
}

/* INLINE FINANCE EDIT */
function startEditFinance(svcId,field){
  const svc=data.services.find(x=>x.id===svcId);if(!svc)return;
  const cell=document.getElementById(`fin-${field}-${svcId}`);if(!cell)return;
  const lbl=field==='price'?'訂閱總額 ✎':'我的分帳 ✎';
  cell.innerHTML=`<div class="fin-label">${lbl}</div><input class="fin-input" type="number" value="${svc[field]||''}" min="0" id="fi-${svcId}-${field}" onblur="saveFinance(${svcId},'${field}',this.value)" onkeydown="if(event.key==='Enter')this.blur()" autofocus>`;
  const inp=document.getElementById(`fi-${svcId}-${field}`);
  if(inp){inp.focus();inp.select();}
}
function saveFinance(svcId,field,val){
  const svc=data.services.find(x=>x.id===svcId);if(!svc)return;
  svc[field]=val;save();render();
  setTimeout(()=>{const c=document.querySelector(`.service-card[data-id="${svcId}"]`);if(c)c.classList.add('open');},40);
}

/* MEMBER MODAL */
let _svcId=null,_mId=null;
function updateMemberShare(){
  const svc=data.services.find(x=>x.id===_svcId);
  if(!svc)return;
  const mc=segVal('m-cycle-pick');
  const monthly=monthlyAdminAmt(svc);
  const shown=mc==='yearly'?Math.round(monthly*12):Math.round(monthly);
  document.getElementById('m-share-hint').textContent=`自動計算：NT$ ${shown} / ${mc==='yearly'?'年':'月'}`;
}
function openAddMember(svcId){
  _svcId=svcId;_mId=null;
  const svc=data.services.find(x=>x.id===svcId);
  document.getElementById('m-modal-title').textContent=`新增成員 — ${svc.name}`;
  document.getElementById('m-modal-confirm').textContent='確認加入';
  ['m-name','m-note','m-expire','m-lastpaid','m-share'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('m-join').value=todayStr();
  document.getElementById('m-renew').value=svc.renew||'';
  document.querySelectorAll('#m-cycle-pick .seg-opt').forEach((o,i)=>o.classList.toggle('active',i===(svc.memberCycle==='yearly'?1:0)));
  updateMemberShare();
  document.getElementById('modal-member').classList.add('open');
}
function openEditMember(svcId,mId){
  _svcId=svcId;_mId=mId;
  const svc=data.services.find(x=>x.id===svcId);
  const m=svc?.members.find(x=>x.id===mId);if(!m)return;
  document.getElementById('m-modal-title').textContent=`編輯 — ${m.name}`;
  document.getElementById('m-modal-confirm').textContent='儲存變更';
  document.getElementById('m-name').value    =m.name||'';
  document.getElementById('m-note').value    =m.note||'';
  document.getElementById('m-join').value    =m.join||'';
  document.getElementById('m-expire').value  =m.expire||'';
  document.getElementById('m-renew').value   =m.renew||'';
  document.getElementById('m-lastpaid').value=m.lastpaid||'';
  document.getElementById('m-share').value   =m.share||'';
  document.querySelectorAll('#m-cycle-pick .seg-opt').forEach(o=>o.classList.toggle('active',o.dataset.val===(m.cycle||'monthly')));
  updateMemberShare();
  document.getElementById('modal-member').classList.add('open');
}
function closeModal(id,e){
  if(!e||e.target===document.getElementById(id))
    document.getElementById(id).classList.remove('open');
}
function saveMember(){
  const name    =document.getElementById('m-name').value.trim();
  const note    =document.getElementById('m-note').value.trim();
  const join    =document.getElementById('m-join').value;
  const expire  =document.getElementById('m-expire').value;
  const renew   =document.getElementById('m-renew').value;
  const lastpaid=document.getElementById('m-lastpaid').value;
  const share   =document.getElementById('m-share').value.trim();
  const cycle   =segVal('m-cycle-pick');
  if(!name){toast('請填寫姓名');return;}
  const svc=data.services.find(x=>x.id===_svcId);if(!svc)return;
  if(_mId){
    const m=svc.members.find(x=>x.id===_mId);
    if(m)Object.assign(m,{name,note,join,expire,renew,lastpaid,share,cycle});
    toast(`已更新 ${name}`);
  }else{
    svc.members.push({id:Date.now(),name,note,join:join||todayStr(),expire,renew,lastpaid,share,cycle,paid:null});
    toast(`✓ 已加入 ${name}`);
  }
  save();render();
  document.getElementById('modal-member').classList.remove('open');
  setTimeout(()=>{const c=document.querySelector(`.service-card[data-id="${_svcId}"]`);if(c)c.classList.add('open');},50);
}
function deleteMember(svcId,mId){
  const svc=data.services.find(x=>x.id===svcId);
  const m=svc?.members.find(x=>x.id===mId);
  if(!m||!confirm(`移除「${m.name}」？`))return;
  svc.members=svc.members.filter(x=>x.id!==mId);
  save();render();toast(`已移除 ${m.name}`);
  setTimeout(()=>{const c=document.querySelector(`.service-card[data-id="${svcId}"]`);if(c)c.classList.add('open');},50);
}

/* PAY MODAL */
let _paySvcId=null,_payMId=null,_payStatus=null;
function openPayModal(svcId,mId){
  _paySvcId=svcId;_payMId=mId;_payStatus=null;
  const svc=data.services.find(x=>x.id===svcId);
  const m=svc?.members.find(x=>x.id===mId);if(!m)return;
  document.getElementById('pay-modal-title').textContent=`付款狀態 — ${m.name}`;
  document.getElementById('pay-opt-paid').classList.remove('sel-paid','sel-unpaid');
  document.getElementById('pay-opt-unpaid').classList.remove('sel-paid','sel-unpaid');
  if(m.paid==='paid')  document.getElementById('pay-opt-paid').classList.add('sel-paid');
  if(m.paid==='unpaid')document.getElementById('pay-opt-unpaid').classList.add('sel-unpaid');
  document.getElementById('pay-next-section').style.display='none';
  document.querySelectorAll('#pay-next-cycle .seg-opt').forEach((o,i)=>o.classList.toggle('active',i===0));
  document.getElementById('pay-custom-date').style.display='none';
  document.getElementById('pay-custom-inp').value='';
  document.getElementById('modal-pay').classList.add('open');
}
function selectPayOpt(status){
  _payStatus=status;
  document.getElementById('pay-opt-paid').classList.remove('sel-paid','sel-unpaid');
  document.getElementById('pay-opt-unpaid').classList.remove('sel-paid','sel-unpaid');
  document.getElementById('pay-opt-'+status).classList.add('sel-'+status);
  document.getElementById('pay-next-section').style.display=status==='paid'?'block':'none';
}
function toggleCustomDate(){
  const val=segVal('pay-next-cycle');
  document.getElementById('pay-custom-date').style.display=val==='custom'?'block':'none';
}
function confirmPay(){
  if(!_payStatus){toast('請選擇付款狀態');return;}
  const svc=data.services.find(x=>x.id===_paySvcId);
  const m=svc?.members.find(x=>x.id===_payMId);if(!m)return;
  m.paid=_payStatus;
  if(_payStatus==='paid'){
    m.lastpaid=todayStr();
    const nextMode=segVal('pay-next-cycle');
    if(nextMode==='month') m.renew=addMonths(todayStr(),1);
    else if(nextMode==='year') m.renew=addYears(todayStr(),1);
    else if(nextMode==='custom'){const cd=document.getElementById('pay-custom-inp').value;if(cd)m.renew=cd;}
  }
  save();render();
  document.getElementById('modal-pay').classList.remove('open');
  toast(`✓ 已更新 ${m.name} 的付款狀態`);
  setTimeout(()=>{const c=document.querySelector(`.service-card[data-id="${_paySvcId}"]`);if(c)c.classList.add('open');},50);
}

/* COPY MSG */
function copyMsg(svcId,mId,btnEl){
  const svc=data.services.find(x=>x.id===svcId);
  const m=svc?.members.find(x=>x.id===mId);
  if(!svc||!m)return;
  const monthly=Math.round(monthlyAdminAmt(svc));
  const d=daysUntil(m.renew);
  const msg=settings.msgTemplate
    .replace(/{name}/g,m.name).replace(/{service}/g,svc.name)
    .replace(/{monthly}/g,monthly.toLocaleString()).replace(/{annual}/g,(monthly*12).toLocaleString())
    .replace(/{renew}/g,m.renew?formatDate(m.renew):'（未設定）')
    .replace(/{days}/g,d!==null?d:'—');
  navigator.clipboard.writeText(msg).then(()=>{
    const orig=btnEl.textContent;
    btnEl.textContent='✓ 已複製';btnEl.classList.add('copied');
    setTimeout(()=>{btnEl.textContent=orig;btnEl.classList.remove('copied');},2200);
    toast('訊息已複製 ✓');
  }).catch(()=>toast('複製失敗'));
}

/* RENDER */
function render(){
  const svcs=data.services;
  const totalM=svcs.reduce((s,x)=>s+myShareMonthly(x),0);
  document.getElementById('st-services').innerHTML=`${svcs.length}<small> 項</small>`;
  document.getElementById('st-monthly').innerHTML =`${Math.round(totalM).toLocaleString()}<small> 元</small>`;
  document.getElementById('st-annual').innerHTML  =`${Math.round(totalM*12).toLocaleString()}<small> 元</small>`;

  const list=document.getElementById('service-list');
  if(!svcs.length){
    list.innerHTML=`<div class="empty"><div class="empty-art">🌱</div><p>尚未新增任何訂閱項目<br>點下方按鈕新增第一個</p></div>`;
    return;
  }

  list.innerHTML=svcs.map(svc=>{
    const isAdmin=svc.myRole!=='member';
    const ri=renewInfo(svc.renew);
    const monthly=monthlyAdminAmt(svc);
    const share=myShareMonthly(svc);
    const debtors=isAdmin?(svc.members||[]).filter(m=>m.paid!=='paid'):[];
    const debtTotal=debtors.reduce((s,m)=>s+memberPayAmt(svc,m),0);

    const finCells=isAdmin
      ?`<div class="fin-cell tap" id="fin-price-${svc.id}" onclick="startEditFinance(${svc.id},'price')">
          <div class="fin-label">訂閱總額 <span class="fin-edit">✎</span></div>
          <div class="fin-val">NT$ ${Math.round(monthly).toLocaleString()}<small>/${svc.adminCycle==='yearly'?'年':'月'}</small></div>
        </div>
        <div class="fin-cell tap" id="fin-share-${svc.id}" onclick="startEditFinance(${svc.id},'share')">
          <div class="fin-label">我的分帳 <span class="fin-edit">✎</span></div>
          <div class="fin-val">NT$ ${Math.round(share).toLocaleString()}<small>/月</small></div>
        </div>`
      :`<div class="fin-cell"><div class="fin-label">我要付</div><div class="fin-val">NT$ ${Math.round(share).toLocaleString()}<small>/月</small></div></div>
        <div class="fin-cell"><div class="fin-label">年度合計</div><div class="fin-val">NT$ ${Math.round(share*12).toLocaleString()}<small>/年</small></div></div>`;

    const membersHtml=(svc.members||[]).length
      ?(svc.members).map(m=>{
          const mri=renewInfo(m.renew);
          const isPaid=m.paid==='paid';
          const isUp=m.paid==='unpaid';
          const payAmt=memberPayAmt(svc,m);
          const statusLabel=isPaid?'已付':isUp?'未付':'未記錄';
          const statusCls=isPaid?'paid':isUp?'unpaid':'none';
          const avatarCls=isPaid?'paid':isUp?'unpaid':'';
          const dateParts=[];
          if(m.join)     dateParts.push({k:'加入',v:formatDate(m.join)});
          if(m.expire)   dateParts.push({k:'到期',v:formatDate(m.expire)});
          if(m.renew)    dateParts.push({k:'下次繳費',v:formatDate(m.renew)});
          if(m.lastpaid) dateParts.push({k:'上次付款',v:formatDate(m.lastpaid)});
          return`<div class="member-card">
            <div class="member-top">
              <div class="m-avatar ${avatarCls}">${m.name.slice(0,1)}</div>
              <div>
                <div class="m-name">${m.name}${m.note?` <span style="font-size:9.5px;font-weight:400;color:var(--text-dim)">· ${m.note}</span>`:''}
                  <span style="font-size:9px;font-weight:600;padding:1px 6px;border-radius:12px;background:var(--paper2);color:var(--text-mid);margin-left:4px">${m.cycle==='yearly'?'年繳':'月繳'} NT$${Math.round(payAmt).toLocaleString()}</span>
                </div>
                <div class="m-sub">${mri.txt?`<span class="renew-badge ${mri.cls}">${mri.txt}</span>`:''}</div>
              </div>
              <button class="pay-status ${statusCls}" onclick="openPayModal(${svc.id},${m.id})">${statusLabel}</button>
            </div>
            ${dateParts.length?`<div class="member-dates">${dateParts.map(p=>`<div class="date-chip"><span>${p.k}</span><strong>${p.v}</strong></div>`).join('')}</div>`:''}
            ${isAdmin?`<div class="member-btm">
              <div style="display:flex;gap:6px">
                <button class="icon-btn" title="編輯" onclick="openEditMember(${svc.id},${m.id})">✎</button>
                <button class="icon-btn danger" title="移除" onclick="deleteMember(${svc.id},${m.id})">✕</button>
              </div>
              <button class="msg-btn" onclick="copyMsg(${svc.id},${m.id},this)">🍃 複製催繳訊息</button>
            </div>`:''}
          </div>`;
        }).join('')
      :`<div style="font-size:12px;color:var(--text-dim);padding:6px 0">尚無成員</div>`;

    const debtHtml=isAdmin&&debtors.length
      ?`<div class="debt-summary">
          <div class="debt-head">💰 待收款 NT$ ${Math.round(debtTotal).toLocaleString()}</div>
          <div class="debt-items">${debtors.map(m=>`<div class="debt-item">${m.name} NT$ ${Math.round(memberPayAmt(svc,m)).toLocaleString()}</div>`).join('')}</div>
        </div>`:
       '';

    const roleBadgeTxt=isAdmin?'管理員':'成員';
    const roleBadgeCls=isAdmin?'mrb-admin':'mrb-member';
    const debtPill=isAdmin&&debtors.length?`<span class="debt-pill">待收 NT$${Math.round(debtTotal).toLocaleString()}</span>`:'';

    return`<div class="service-card ${isAdmin?'':'role-member'}" data-id="${svc.id}">
      <div class="svc-header">
        <div class="svc-header-main" onclick="toggleCard(${svc.id})">
          <div class="svc-emoji">${svc.emoji}</div>
          <div class="svc-text">
            <div class="svc-name-row">
              <span class="svc-name">${svc.name}</span>
              <span class="my-role-badge ${roleBadgeCls}">${roleBadgeTxt}</span>
              ${debtPill}
            </div>
            <div class="svc-meta">${svc.adminCycle==='yearly'?'年繳':'月繳'} · 成員${svc.memberCycle==='yearly'?'年':'月'}繳${(svc.members||[]).length?` · ${svc.members.length}人`:''}${svc.note?' · '+svc.note:''}${ri.txt?` · <span class="renew-badge ${ri.cls}" style="display:inline">${ri.txt}</span>`:''}</div>
          </div>
        </div>
        <div class="svc-header-actions">
          <div class="svc-price-cell">
            <span class="svc-price">NT$ ${Math.round(share).toLocaleString()}</span>
            <span class="svc-price-sub">/月</span>
          </div>
          <button class="svc-action-btn" title="編輯訂閱" onclick="openEditService(${svc.id})">✎</button>
          <button class="svc-action-btn danger" title="刪除訂閱" onclick="deleteService(${svc.id})">✕</button>
          <button class="svc-action-btn" title="展開" onclick="toggleCard(${svc.id})"><span class="chevron">▾</span></button>
        </div>
      </div>
      <div class="svc-body">
        <div class="finance-row">${finCells}</div>
        <div class="members-wrap">${membersHtml}</div>
        ${debtHtml}
        ${isAdmin?`<div class="card-footer"><button class="btn-add-member" onclick="openAddMember(${svc.id})">＋ 新增成員</button></div>`:''}
      </div>
    </div>`;
  }).join('');
}

document.getElementById('inp-svc-start').value=todayStr();
loadSettingsUI();
render();
</script>
</body>
</html>
