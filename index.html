<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>家庭訂閱管理</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --oak:        #fafaf8;
  --paper:      #f4f2ee;
  --paper2:     #ece9e2;
  --border:     rgba(44,44,39,0.1);
  --border2:    rgba(44,44,39,0.18);
  --bark:       #8b673c;
  --bark-dark:  #5c3d1e;
  --bark-pale:  #f6f2eb;
  --moss:       #3d4f3a;
  --moss-pale:  #eef1eb;
  --sage:       #6b7c65;
  --sage-pale:  #d4ddd1;
  --meadow:     #50b050;
  --meadow-pale:#f0faf0;
  --sky:        #3a8daa;
  --sky-pale:   #e8f4f8;
  --sky-dark:   #1e5a72;
  --amber:      #c8820f;
  --amber-pale: #fef8ed;
  --amber-dark: #8a5500;
  --maple:      #c25844;
  --maple-pale: #fdf0ee;
  --maple-dark: #8a2e1e;
  --green:      #5a8a5a;
  --green-pale: #edf5ed;
  --text:       #2c2c27;
  --text-mid:   #6b6860;
  --text-dim:   #9e9b93;
  --r:          10px;
  --r-lg:       14px;
  --ff:         'Zen Kaku Gothic New', sans-serif;
  --nav-h:      56px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--paper);color:var(--text);font-family:var(--ff);font-weight:400;}

/* ── APP SHELL ── */
#app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;background:var(--oak);position:relative;overflow:hidden;}

/* screens stack */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--oak);transition:transform .28s cubic-bezier(.4,0,.2,1),opacity .28s;will-change:transform;}
.screen.hidden-right{transform:translateX(100%);pointer-events:none;}
.screen.hidden-left {transform:translateX(-18%);opacity:.6;pointer-events:none;}
.screen.active{transform:translateX(0);opacity:1;}

/* ── NAV BAR ── */
.nav-bar{
  height:var(--nav-h);flex-shrink:0;
  display:flex;align-items:center;
  padding:0 16px;gap:8px;
  background:var(--oak);
  border-bottom:1px solid var(--border);
  position:relative;
}
.nav-back{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border:none;background:none;color:var(--text-mid);cursor:pointer;border-radius:50%;transition:background .14s;flex-shrink:0;}
.nav-back:hover{background:var(--paper);}
.nav-back svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.nav-title{flex:1;font-size:16px;font-weight:700;color:var(--moss);letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nav-action{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border2);background:none;color:var(--text-mid);cursor:pointer;border-radius:8px;transition:all .14s;flex-shrink:0;font-size:15px;}
.nav-action:hover{background:var(--moss-pale);color:var(--moss);border-color:var(--sage-pale);}

/* ── SCROLL AREA ── */
.scroll{flex:1;overflow-y:auto;padding:12px 14px 80px;-webkit-overflow-scrolling:touch;}
.scroll::-webkit-scrollbar{display:none;}

/* ── STATS ── */
.stats-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:14px;}
.stat-cell{background:var(--paper);border:1px solid var(--border);border-radius:var(--r);padding:9px 10px;}
.stat-lbl{font-size:9px;letter-spacing:.17em;color:var(--text-dim);text-transform:uppercase;font-weight:500;margin-bottom:3px;}
.stat-val{font-size:16px;font-weight:700;color:var(--moss);line-height:1;}
.stat-val small{font-size:9px;color:var(--text-dim);font-weight:400;margin-left:1px;}

/* ── LIST CARD (Option C style) ── */
.svc-list{display:flex;flex-direction:column;gap:8px;}

.svc-list-card{
  background:var(--oak);border:1px solid var(--border);
  border-radius:var(--r-lg);overflow:hidden;
  cursor:pointer;transition:border-color .15s,box-shadow .15s;
  position:relative;
  -webkit-tap-highlight-color:transparent;
}
.svc-list-card:hover{border-color:var(--border2);box-shadow:0 2px 10px rgba(0,0,0,.05);}
.svc-list-card:active{background:var(--paper);}
/* role stripe */
.svc-list-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:14px 0 0 14px;background:var(--moss);}
.svc-list-card.role-member::before{background:var(--meadow);}

/* card top row */
.slc-top{display:flex;align-items:flex-start;justify-content:space-between;padding:11px 12px 6px 15px;gap:8px;}
.slc-left{display:flex;align-items:center;gap:8px;min-width:0;flex:1;}
.slc-emoji{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;background:var(--moss-pale);flex-shrink:0;}
.slc-title{min-width:0;}
.slc-name{font-size:13.5px;font-weight:700;color:var(--bark-dark);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.slc-sub{font-size:10px;color:var(--text-dim);margin-top:2px;}
/* amount block — bottom-aligned baseline */
.slc-right{display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0;}
.slc-amt-row{display:flex;align-items:flex-end;gap:3px;line-height:1;}
.slc-amt{font-size:17px;font-weight:700;color:var(--moss);}
.slc-per{font-size:10px;color:var(--text-dim);font-weight:400;padding-bottom:1px;}/* bottom-aligned via flex items-end */

/* card bottom row */
.slc-bottom{display:flex;align-items:center;justify-content:space-between;padding:4px 12px 9px 15px;gap:6px;}
.pip-row{display:flex;align-items:center;}
.pip{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:700;border:2px solid var(--oak);margin-left:-5px;flex-shrink:0;}
.pip:first-child{margin-left:0;}
.pip-paid  {background:var(--green-pale);color:var(--green);}
.pip-unpaid{background:var(--maple-pale);color:var(--maple);}
.pip-none  {background:var(--paper2);color:var(--text-dim);}
.pip-more  {background:var(--paper2);color:var(--text-dim);}
/* tags row on bottom-right */
.tag-row{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;}
.tag{font-size:9px;font-weight:600;padding:2px 7px;border-radius:20px;white-space:nowrap;}
.tag-admin {background:var(--moss-pale);color:var(--moss);}
.tag-member{background:var(--meadow-pale);color:#2e7a2e;}
.tag-soon  {background:var(--sky-pale);color:var(--sky-dark);}
.tag-due   {background:var(--amber-pale);color:var(--amber-dark);}
.tag-over  {background:var(--maple-pale);color:var(--maple);}
.tag-debt  {background:var(--maple-pale);color:var(--maple);}

/* ── ADD BUTTON ── */
.btn-add-fab{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--moss);color:white;border:none;border-radius:14px;
  padding:13px 28px;font-family:var(--ff);font-size:13px;font-weight:700;
  letter-spacing:.08em;cursor:pointer;transition:all .15s;
  display:flex;align-items:center;gap:8px;
  box-shadow:0 4px 18px rgba(61,79,58,.28);
  max-width:calc(480px - 28px);
}
.btn-add-fab:hover{background:#2e3d2c;transform:translateX(-50%) translateY(-1px);}

/* ── DETAIL SCREEN ── */
.detail-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.detail-scroll::-webkit-scrollbar{display:none;}

/* hero block */
.detail-hero{background:var(--paper);border-bottom:1px solid var(--border);padding:16px 16px 14px;}
.hero-top{display:flex;align-items:center;gap:12px;}
.hero-emoji{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;background:var(--moss-pale);flex-shrink:0;}
.hero-mid{flex:1;min-width:0;}
.hero-name{font-size:19px;font-weight:700;color:var(--bark-dark);line-height:1.2;}
.hero-meta-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:5px;}
.hero-sub{font-size:11px;color:var(--text-dim);}
.hero-tags{display:flex;gap:5px;flex-wrap:wrap;}
.hero-price{flex-shrink:0;text-align:right;display:flex;flex-direction:column;align-items:flex-end;}
.hero-price .hp-amt{font-size:20px;font-weight:700;color:var(--moss);line-height:1.05;white-space:nowrap;}
.hero-price .hp-amt small{font-size:11px;color:var(--text-dim);font-weight:400;margin-left:1px;}
.hero-price .hp-lbl{font-size:9px;letter-spacing:.12em;color:var(--text-dim);text-transform:uppercase;font-weight:500;margin-bottom:2px;}
.hero-price .hp-sub{font-size:9.5px;color:var(--text-dim);margin-top:2px;}

/* finance cells */
.detail-fin{display:grid;grid-template-columns:1fr 1fr;gap:4px;padding:12px 14px;border-bottom:1px solid var(--border);}
.fin-box{background:var(--paper);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;}
.fin-box.tap{cursor:pointer;transition:background .13s;}
.fin-box.tap:hover{background:var(--moss-pale);}
.fin-lbl{font-size:9px;letter-spacing:.15em;color:var(--text-dim);text-transform:uppercase;font-weight:500;margin-bottom:3px;}
.fin-v{font-size:17px;font-weight:700;color:var(--moss);line-height:1.1;}
.fin-v small{font-size:10px;color:var(--text-dim);font-weight:400;margin-left:2px;}
.fin-edit-hint{font-size:9.5px;color:var(--text-dim);margin-top:2px;}
.fin-input{width:100%;font-size:16px;font-weight:700;color:var(--moss);background:transparent;border:none;border-bottom:1.5px solid var(--sage);font-family:var(--ff);outline:none;padding:0 0 2px;}

/* section header */
.sec-head{display:flex;align-items:center;justify-content:space-between;padding:14px 14px 8px;}
.sec-title{font-size:10.5px;letter-spacing:.18em;color:var(--sage);text-transform:uppercase;font-weight:700;}
.sec-action{font-size:11px;font-weight:500;color:var(--moss);cursor:pointer;padding:4px 8px;border-radius:6px;transition:background .13s;}
.sec-action:hover{background:var(--moss-pale);}

/* collection status bar */
.collection-bar{margin:0 14px 12px;background:var(--paper);border:1px solid var(--border);border-radius:var(--r);padding:11px 12px;}
.cb-label{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
.cb-title{font-size:10px;font-weight:700;color:var(--text-mid);}
.cb-status{font-size:10px;font-weight:500;}
.cb-bar{height:5px;border-radius:4px;background:var(--paper2);overflow:hidden;display:flex;margin-bottom:6px;}
.cb-seg{height:100%;transition:width .3s;}
.cb-legend{display:flex;gap:10px;}
.cb-dot{display:flex;align-items:center;gap:4px;font-size:9.5px;color:var(--text-dim);}
.cb-dot span{width:8px;height:8px;border-radius:2px;flex-shrink:0;}

/* split mode toggle */
.split-mode-row{display:flex;gap:4px;margin:0 14px 12px;}
.split-mode-btn{flex:1;padding:7px;text-align:center;font-family:var(--ff);font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--border2);border-radius:7px;background:var(--oak);color:var(--text-dim);transition:all .13s;}
.split-mode-btn.active{background:var(--moss);color:white;border-color:var(--moss);}
.split-mode-btn:not(.active):hover{background:var(--moss-pale);color:var(--moss);}

/* member detail row */
.member-section{padding:0 14px;}
.member-card{background:var(--oak);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden;transition:border-color .13s;}
.member-card:hover{border-color:var(--border2);}
.mc-top{display:flex;align-items:center;gap:9px;padding:10px 11px;}
.mc-av{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;border:1.5px solid var(--sage-pale);background:var(--moss-pale);color:var(--moss);transition:all .13s;}
.mc-av.paid  {background:var(--green-pale);border-color:rgba(90,138,90,.4);color:var(--green);}
.mc-av.unpaid{background:var(--maple-pale);border-color:rgba(194,88,68,.4);color:var(--maple);}
.mc-info{flex:1;min-width:0;}
.mc-name{font-size:13px;font-weight:600;color:var(--bark-dark);}
.mc-note{font-size:10px;color:var(--text-dim);margin-top:1px;}
/* pay toggle + amount */
.mc-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;}
.mc-amt{font-size:12px;font-weight:700;color:var(--moss);}
.pay-seg{display:flex;border:1px solid var(--border2);border-radius:6px;overflow:hidden;}
.ps-opt{padding:4px 9px;font-family:var(--ff);font-size:10.5px;font-weight:700;cursor:pointer;transition:all .12s;letter-spacing:.04em;border-right:1px solid var(--border2);color:var(--text-dim);background:transparent;white-space:nowrap;}
.ps-opt:last-child{border-right:none;}
.ps-opt.paid  {background:var(--green-pale);color:var(--green);}
.ps-opt.unpaid{background:var(--maple-pale);color:var(--maple);}
/* dates */
.mc-dates{display:flex;flex-wrap:wrap;gap:5px;padding:7px 11px;border-top:1px solid var(--border);background:var(--paper);}
.mc-secondary{display:flex;align-items:center;gap:12px;padding:7px 11px;border-top:1px solid var(--border);font-size:10px;color:var(--text-dim);}
.dc{display:flex;flex-direction:column;gap:1px;}
.dc span{font-size:9px;color:var(--text-dim);}
.dc strong{font-size:11px;color:var(--text-mid);font-weight:500;}
/* date input row */
.mc-pay-date{display:flex;align-items:center;gap:8px;padding:7px 11px;border-top:1px solid var(--border);background:var(--paper);}
.mc-pay-date label{font-size:10px;color:var(--text-mid);font-weight:500;white-space:nowrap;}
.mc-pay-date input[type=date]{flex:1;border:1px solid var(--border);border-radius:5px;padding:5px 8px;font-family:var(--ff);font-size:11.5px;color:var(--text);background:var(--oak);outline:none;-webkit-appearance:none;}
.mc-pay-date input[type=date]:focus{border-color:var(--sage);box-shadow:0 0 0 2px rgba(107,124,101,.1);}
/* member edit row */
.mc-actions{display:flex;align-items:center;justify-content:flex-end;gap:6px;padding:6px 11px;border-top:1px solid var(--border);}
.icon-btn{display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:6px;background:transparent;border:1px solid var(--border);color:var(--text-dim);cursor:pointer;transition:all .12s;font-size:13px;font-family:var(--ff);}
.icon-btn:hover{border-color:var(--sage);color:var(--moss);background:var(--moss-pale);}
.icon-btn.danger:hover{border-color:var(--maple);color:var(--maple);background:var(--maple-pale);}

/* settings tab */
.settings-section{margin-bottom:20px;padding:0 14px;}
.settings-card{background:var(--paper);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px;}
.settings-title{font-size:10px;letter-spacing:.17em;color:var(--sage);text-transform:uppercase;font-weight:700;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border);}

/* FORMS */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:10px;}
.field:last-child{margin-bottom:0;}
.field.full{grid-column:1/-1;}
label{font-size:9.5px;letter-spacing:.16em;color:var(--text-mid);text-transform:uppercase;font-weight:500;}
input,select,textarea{background:var(--oak);border:1px solid var(--border);border-radius:5px;padding:9px 11px;font-family:var(--ff);font-size:13px;color:var(--text);outline:none;transition:border-color .13s,box-shadow .13s;-webkit-appearance:none;width:100%;}
input:focus,select:focus,textarea:focus{border-color:var(--sage);box-shadow:0 0 0 3px rgba(107,124,101,.08);}
input::placeholder,textarea::placeholder{color:var(--text-dim);}
textarea{resize:vertical;min-height:80px;line-height:1.7;}
select option{background:white;}
input[type="date"]::-webkit-calendar-picker-indicator{opacity:.36;cursor:pointer;}
.hint{font-size:10px;color:var(--text-dim);line-height:1.6;margin-top:3px;}
.hint code{background:var(--paper2);border-radius:3px;padding:1px 4px;font-family:monospace;font-size:9.5px;color:var(--bark);}

.seg{display:flex;border:1px solid var(--border2);border-radius:6px;overflow:hidden;background:var(--oak);}
.seg-opt{flex:1;padding:8px 6px;text-align:center;font-family:var(--ff);font-size:12px;font-weight:500;color:var(--text-dim);cursor:pointer;transition:background .13s,color .13s;letter-spacing:.04em;user-select:none;border-right:1px solid var(--border2);}
.seg-opt:last-child{border-right:none;}
.seg-opt.active{background:var(--moss);color:white;}
.seg-opt:not(.active):hover{background:var(--moss-pale);color:var(--moss);}

.btn-primary{width:100%;padding:11px 16px;background:var(--moss);color:white;border:none;border-radius:8px;font-family:var(--ff);font-size:12px;font-weight:700;letter-spacing:.1em;cursor:pointer;transition:all .13s;margin-top:4px;}
.btn-primary:hover{background:#2e3d2c;}
.btn-save{padding:9px 18px;background:var(--moss);color:white;border:none;border-radius:6px;font-family:var(--ff);font-size:11.5px;font-weight:700;cursor:pointer;transition:all .13s;}
.btn-save:hover{background:#2e3d2c;}
.btn-secondary{padding:9px 14px;background:var(--paper2);color:var(--text-mid);border:1px solid var(--border);border-radius:6px;font-family:var(--ff);font-size:11.5px;font-weight:500;cursor:pointer;transition:all .13s;}
.btn-secondary:hover{border-color:var(--border2);color:var(--text);}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;}

/* MODAL */
.modal-bg{display:none;position:absolute;inset:0;background:rgba(44,44,39,.32);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(3px);padding:16px;}
.modal-bg.open{display:flex;}
.modal-box{background:var(--oak);border-radius:var(--r-lg);padding:20px 18px;max-width:420px;width:100%;max-height:85vh;overflow-y:auto;animation:fadeUp .18s ease;}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.modal-title{font-size:13.5px;font-weight:700;color:var(--moss);}
.modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--text-dim);padding:2px 6px;}
.modal-divider{font-size:9.5px;letter-spacing:.16em;color:var(--text-dim);text-transform:uppercase;font-weight:600;margin:12px 0 8px;padding-top:10px;border-top:1px solid var(--border);grid-column:1/-1;}

/* TOAST */
.toast{position:absolute;bottom:22px;right:14px;background:var(--moss);color:rgba(255,255,255,.92);border-radius:8px;padding:8px 14px;font-size:11.5px;font-weight:500;z-index:999;opacity:0;transform:translateY(6px);transition:all .18s;pointer-events:none;box-shadow:0 4px 16px rgba(61,79,58,.22);}
.toast.show{opacity:1;transform:translateY(0);}

/* EMPTY */
.empty{text-align:center;padding:36px 20px;border:1px dashed var(--border2);border-radius:var(--r-lg);color:var(--text-dim);}
.empty-art{font-size:26px;margin-bottom:10px;opacity:.4;}
.empty p{font-size:12.5px;line-height:1.8;}

@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="app">

<!-- ══════════════ SCREEN: LIST ══════════════ -->
<div class="screen active" id="screen-list">
  <div class="nav-bar">
    <div style="width:36px"></div>
    <div class="nav-title">家庭訂閱管理</div>
    <button class="nav-action" id="btn-go-settings" title="設定">⚙</button>
  </div>
  <div class="scroll" id="list-scroll">
    <div class="stats-strip">
      <div class="stat-cell"><div class="stat-lbl">項目</div><div class="stat-val" id="st-count">0<small> 項</small></div></div>
      <div class="stat-cell"><div class="stat-lbl">每月</div><div class="stat-val" id="st-monthly">0<small> 元</small></div></div>
      <div class="stat-cell"><div class="stat-lbl">年度</div><div class="stat-val" id="st-annual">0<small> 元</small></div></div>
    </div>
    <div class="svc-list" id="svc-list"></div>
  </div>
  <button class="btn-add-fab" id="btn-open-add">＋ 新增訂閱項目</button>
</div>

<!-- ══════════════ SCREEN: DETAIL ══════════════ -->
<div class="screen hidden-right" id="screen-detail">
  <div class="nav-bar">
    <button class="nav-back" id="btn-back" title="返回">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="nav-title" id="detail-nav-title">訂閱詳情</div>

<script>
/* ═══════════════════ DATA ═══════════════════ */
const DEFAULT_TEMPLATE=`嗨 {name}！提醒你「{service}」訂閱費用繳費通知 🌿

• 月費金額：NT$ {monthly}
• 下次續費：{renew}（還有 {days} 天）

請記得在到期前完成轉帳，謝謝你！`;

let data    =JSON.parse(localStorage.getItem('sub_v10')||'{"services":[]}');
let settings=JSON.parse(localStorage.getItem('sub_cfg5')||'{}');
if(!settings.msgTemplate) settings.msgTemplate=DEFAULT_TEMPLATE;

let _detailSvcId=null;
let _editMId=null;
let _editSvcMode=false; // false=add, true=edit

function save(){localStorage.setItem('sub_v10',JSON.stringify(data));}
function saveCfg(){localStorage.setItem('sub_cfg5',JSON.stringify(settings));}

/* ═══════════════════ UTILS ═══════════════════ */
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2200);
}
function todayStr(){return new Date().toISOString().slice(0,10);}
function addMonths(s,n){const d=new Date(s);d.setMonth(d.getMonth()+n);return d.toISOString().slice(0,10);}
function addYears(s,n) {const d=new Date(s);d.setFullYear(d.getFullYear()+n);return d.toISOString().slice(0,10);}
function formatDate(s){if(!s)return'—';const[y,m,d]=s.split('-');return`${y}/${m}/${d}`;}
function daysUntil(s){
  if(!s)return null;
  const t=new Date();t.setHours(0,0,0,0);
  return Math.round((new Date(s)-t)/86400000);
}
function renewInfo(s){
  const d=daysUntil(s);
  if(d===null)return{txt:null,cls:''};
  if(d<0)    return{txt:`逾期 ${Math.abs(d)} 天`,cls:'tag-over'};
  if(d<=14)  return{txt:`${d} 天後續訂`,cls:'tag-due'};
  return{txt:`${d} 天後續訂`,cls:'tag-soon'};
}
function monthlyAmt(svc){
  const p=parseFloat(svc.price)||0;
  return svc.adminCycle==='yearly'?p/12:p;
}
function myShare(svc){
  // returns monthly-equivalent
  const split=parseFloat(svc.adminSplit);
  if(!isNaN(split)&&split>=0) return svc.adminCycle==='yearly'?split/12:split;
  const s=parseFloat(svc.share);
  const base=(!isNaN(s)&&s>0)?s:(parseFloat(svc.price)||0);
  return svc.adminCycle==='yearly'?base/12:base;
}
function memberMonthly(svc,m){
  const ms=parseFloat(m.splitAmt);
  if(!isNaN(ms)&&ms>=0) return ms; // splitAmt stored as monthly
  const ms2=parseFloat(m.share);
  if(!isNaN(ms2)&&ms2>0) return svc.memberCycle==='yearly'?ms2/12:ms2;
  return monthlyAmt(svc);
}
function pickSeg(el,groupId){
  document.querySelectorAll(`#${groupId} .seg-opt`).forEach(o=>o.classList.remove('active'));
  el.classList.add('active');
}
function segVal(groupId){
  const el=document.querySelector(`#${groupId} .seg-opt.active`);
  return el?.dataset.val||el?.dataset.role||'';
}

/* ═══════════════════ NAVIGATION ═══════════════════ */
function goTo(screenId){
  document.querySelectorAll('.screen').forEach(s=>{
    if(s.id===screenId){
      s.classList.remove('hidden-right','hidden-left');
      s.classList.add('active');
    } else if(s.classList.contains('active')){
      s.classList.remove('active');
      s.classList.add('hidden-left');
    } else {
      s.classList.add('hidden-right');
    }
  });
}
function goBack(){
  const active=document.querySelector('.screen.active');
  const left  =document.querySelector('.screen.hidden-left');
  if(!left)return;
  active.classList.remove('active'); active.classList.add('hidden-right');
  left.classList.remove('hidden-left'); left.classList.add('active');
}

document.getElementById('btn-back').addEventListener('click',()=>{renderList();goBack();});
document.getElementById('btn-settings-back').addEventListener('click',goBack);
document.getElementById('btn-go-settings').addEventListener('click',()=>{
  document.getElementById('msg-template').value=settings.msgTemplate;
  goTo('screen-settings');
});
document.getElementById('btn-open-add').addEventListener('click',()=>openSvcModal(false));
document.getElementById('btn-detail-edit').addEventListener('click',()=>openSvcModal(true));
document.getElementById('btn-add-member').addEventListener('click',()=>openMemberModal(null));

/* ═══════════════════ SETTINGS / ICS ═══════════════════ */
function saveMsgTemplate(){settings.msgTemplate=document.getElementById('msg-template').value;saveCfg();toast('訊息範本已儲存 ✓');}
function resetMsgTemplate(){settings.msgTemplate=DEFAULT_TEMPLATE;document.getElementById('msg-template').value=DEFAULT_TEMPLATE;saveCfg();toast('已恢復預設');}

function icsDate(s){return new Date(s).toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';}
function exportICS(){
  const days=parseInt(document.getElementById('ics-days').value);
  const scope=document.getElementById('ics-scope').value;
  const lines=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//家庭訂閱管理//ZH','CALSCALE:GREGORIAN','METHOD:PUBLISH'];
  let count=0;
  data.services.forEach(svc=>{
    if(svc.renew&&(scope==='all'||scope==='renew')){
      lines.push('BEGIN:VEVENT',`UID:svc-${svc.id}@sub`,`DTSTAMP:${icsDate(todayStr())}`,
        `DTSTART;VALUE=DATE:${svc.renew.replace(/-/g,'')}`,`DTEND;VALUE=DATE:${svc.renew.replace(/-/g,'')}`,
        `SUMMARY:💳 ${svc.name} 續費`,`DESCRIPTION:NT$${Math.round(monthlyAmt(svc))}`,
        `BEGIN:VALARM\r\nTRIGGER:-P${days}D\r\nACTION:DISPLAY\r\nDESCRIPTION:${svc.name} 即將到期\r\nEND:VALARM`,
        'END:VEVENT');count++;
    }
    (svc.members||[]).forEach(m=>{
      if(!m.renew)return;
      lines.push('BEGIN:VEVENT',`UID:mbr-${m.id}@sub`,`DTSTAMP:${icsDate(todayStr())}`,
        `DTSTART;VALUE=DATE:${m.renew.replace(/-/g,'')}`,`DTEND;VALUE=DATE:${m.renew.replace(/-/g,'')}`,
        `SUMMARY:🌿 ${m.name}｜${svc.name}`,`DESCRIPTION:NT$${Math.round(memberMonthly(svc,m))}`,
        `BEGIN:VALARM\r\nTRIGGER:-P${days}D\r\nACTION:DISPLAY\r\nDESCRIPTION:提醒 ${m.name} 繳交 ${svc.name}\r\nEND:VALARM`,
        'END:VEVENT');count++;
    });
  });
  if(!count){toast('沒有可匯出的事件');return;}
  lines.push('END:VCALENDAR');
  const blob=new Blob([lines.join('\r\n')],{type:'text/calendar'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='家庭訂閱.ics';a.click();
  toast(`✓ 已匯出 ${count} 個事件`);
}

/* ═══════════════════ MODALS ═══════════════════ */
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.getElementById('modal-svc').addEventListener('click',function(e){if(e.target===this)closeModal('modal-svc');});
document.getElementById('modal-member').addEventListener('click',function(e){if(e.target===this)closeModal('modal-member');});

/* ── Service Modal ── */
function applyPreset(){
  const sel=document.getElementById('inp-preset');
  const opt=sel.options[sel.selectedIndex];
  if(!opt.value)return;
  document.getElementById('inp-svc-name').value =opt.text;
  document.getElementById('inp-svc-emoji').value=opt.dataset.emoji||'📌';
  document.getElementById('inp-svc-price').value=opt.dataset.price||'';
  const cycle=opt.dataset.cycle||'monthly';
  document.querySelectorAll('#svc-admin-cycle .seg-opt').forEach(o=>o.classList.toggle('active',o.dataset.val===cycle));
  updatePriceHint();
}
function updatePriceHint(){
  const price=parseFloat(document.getElementById('inp-svc-price').value)||0;
  const ac=segVal('svc-admin-cycle');
  const mc=segVal('svc-member-cycle');
  if(!price){document.getElementById('price-hint').textContent='';return;}
  const monthly=ac==='yearly'?price/12:price;
  const shown=mc==='yearly'?Math.round(monthly*12):Math.round(monthly);
  document.getElementById('price-hint').textContent=`自動計算：NT$ ${shown}/${mc==='yearly'?'年':'月'}`;
}
function openSvcModal(isEdit){
  _editSvcMode=isEdit;
  const svc=isEdit?data.services.find(x=>x.id===_detailSvcId):null;
  document.getElementById('modal-svc-title').textContent=isEdit?'編輯訂閱項目':'新增訂閱項目';
  document.getElementById('modal-svc-confirm').textContent=isEdit?'儲存變更':'建立訂閱項目';
  document.getElementById('inp-preset').value='';
  if(isEdit&&svc){
    document.getElementById('inp-svc-name').value =svc.name||'';
    document.getElementById('inp-svc-emoji').value=svc.emoji||'';
    document.getElementById('inp-svc-price').value=svc.price||'';
    document.getElementById('inp-svc-share').value=svc.share||'';
    document.getElementById('inp-svc-renew').value=svc.renew||'';
    document.getElementById('inp-svc-start').value=svc.start||'';
    document.getElementById('inp-svc-note').value =svc.note||'';
    const setSegs=(gId,val)=>document.querySelectorAll(`#${gId} .seg-opt`).forEach(o=>o.classList.toggle('active',(o.dataset.val||o.dataset.role)===val));
    setSegs('svc-role-pick',svc.myRole||'admin');
    setSegs('svc-admin-cycle',svc.adminCycle||'monthly');
    setSegs('svc-member-cycle',svc.memberCycle||'monthly');
  } else {
    ['inp-svc-name','inp-svc-emoji','inp-svc-price','inp-svc-share','inp-svc-renew','inp-svc-start','inp-svc-note'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('inp-svc-start').value=todayStr();
    ['svc-admin-cycle','svc-member-cycle'].forEach(g=>document.querySelectorAll(`#${g} .seg-opt`).forEach((o,i)=>o.classList.toggle('active',i===0)));
    document.querySelectorAll('#svc-role-pick .seg-opt').forEach((o,i)=>o.classList.toggle('active',i===0));
  }
  document.getElementById('price-hint').textContent='';
  document.getElementById('modal-svc').classList.add('open');
}
function saveSvc(){
  const name=document.getElementById('inp-svc-name').value.trim();
  const emoji=document.getElementById('inp-svc-emoji').value.trim()||'📌';
  const price=document.getElementById('inp-svc-price').value.trim();
  const share=document.getElementById('inp-svc-share').value.trim();
  const adminCycle=segVal('svc-admin-cycle');
  const memberCycle=segVal('svc-member-cycle');
  const myRole=segVal('svc-role-pick');
  const start=document.getElementById('inp-svc-start').value;
  const renew=document.getElementById('inp-svc-renew').value;
  const note=document.getElementById('inp-svc-note').value.trim();
  if(!name||!price){toast('請填寫服務名稱和費用');return;}
  if(_editSvcMode){
    const svc=data.services.find(x=>x.id===_detailSvcId);
    if(svc) Object.assign(svc,{name,emoji,price,share,adminCycle,memberCycle,myRole,start,renew,note});
    save(); renderList(); renderDetail(); closeModal('modal-svc'); toast(`已更新「${name}」`);
  } else {
    data.services.push({id:Date.now(),name,emoji,price,share,adminCycle,memberCycle,myRole:myRole||'admin',start:start||todayStr(),renew,note,members:[],splitMode:'equal'});
    save(); renderList(); closeModal('modal-svc'); toast(`✓ 已建立「${name}」`);
  }
}
function deleteService(id){
  const s=data.services.find(x=>x.id===id);
  if(!s||!confirm(`確定刪除「${s.name}」嗎？`))return;
  data.services=data.services.filter(x=>x.id!==id);
  save(); renderList(); goBack(); toast(`已刪除 ${s.name}`);
}

/* ── Member Modal ── */
function openMemberModal(mId){
  _editMId=mId;
  const svc=data.services.find(x=>x.id===_detailSvcId);if(!svc)return;
  const m=mId?svc.members.find(x=>x.id===mId):null;
  document.getElementById('modal-member-title').textContent=m?`編輯 — ${m.name}`:`新增成員 — ${svc.name}`;
  document.getElementById('modal-member-confirm').textContent=m?'儲存變更':'確認加入';
  document.getElementById('m-name').value    =m?.name||'';
  document.getElementById('m-note').value    =m?.note||'';
  document.getElementById('m-share').value   =m?.share||'';
  document.getElementById('m-join').value    =m?.join||todayStr();
  document.getElementById('m-renew').value   =m?.renew||svc.renew||'';
  document.getElementById('m-lastpaid').value=m?.lastpaid||'';
  document.querySelectorAll('#m-cycle .seg-opt').forEach(o=>o.classList.toggle('active',o.dataset.val===(m?.cycle||svc.memberCycle||'monthly')));
  document.getElementById('modal-member').classList.add('open');
}
function saveMember(){
  const name    =document.getElementById('m-name').value.trim();
  const note    =document.getElementById('m-note').value.trim();
  const share   =document.getElementById('m-share').value.trim();
  const cycle   =segVal('m-cycle');
  const join    =document.getElementById('m-join').value;
  const renew   =document.getElementById('m-renew').value;
  const lastpaid=document.getElementById('m-lastpaid').value;
  if(!name){toast('請填寫姓名');return;}
  const svc=data.services.find(x=>x.id===_detailSvcId);if(!svc)return;
  if(_editMId){
    const m=svc.members.find(x=>x.id===_editMId);
    if(m) Object.assign(m,{name,note,share,cycle,join,renew,lastpaid});
    toast(`已更新 ${name}`);
  } else {
    svc.members.push({id:Date.now(),name,note,share,cycle,join,renew,lastpaid,paid:null,payDate:''});
    toast(`✓ 已加入 ${name}`);
  }
  save(); renderDetail(); closeModal('modal-member');
  // auto-equal split
  if(svc.splitMode==='equal') doEqualSplit(svc);
}
function deleteMember(svcId,mId){
  const svc=data.services.find(x=>x.id===svcId);
  const m=svc?.members.find(x=>x.id===mId);
  if(!m||!confirm(`移除「${m.name}」？`))return;
  svc.members=svc.members.filter(x=>x.id!==mId);
  save(); renderDetail(); toast(`已移除 ${m.name}`);
  if(svc.splitMode==='equal') doEqualSplit(svc);
}

/* ── Pay ── */
function togglePay(svcId,mId,status){
  const svc=data.services.find(x=>x.id===svcId);
  const m=svc?.members.find(x=>x.id===mId);
  if(!m)return;
  const wasAlreadyThis=(m.paid===status);
  m.paid=wasAlreadyThis?null:status;
  if(m.paid==='paid'){
    // record payment date
    const today=todayStr();
    m.payDate=today;
    m.lastpaid=today;
    // auto-advance next renewal date based on member cycle
    const cycle=m.cycle||svc.memberCycle||'monthly';
    m.renew=cycle==='yearly'?addYears(today,1):addMonths(today,1);
  } else {
    m.payDate='';
  }
  save(); renderDetail();
  if(m.paid==='paid') toast(`✓ ${m.name} 已付款，下次繳費日已更新`);
}
function updatePayDate(svcId,mId,val){
  const svc=data.services.find(x=>x.id===svcId);
  const m=svc?.members.find(x=>x.id===mId);
  if(!m)return;
  m.payDate=val;
  m.lastpaid=val;
  // re-derive next renewal from this payment date
  const cycle=m.cycle||svc.memberCycle||'monthly';
  m.renew=cycle==='yearly'?addYears(val,1):addMonths(val,1);
  save(); renderDetail();
}

/* ── Split ── */
function doEqualSplit(svc){
  const total=monthlyAmt(svc);
  const count=1+(svc.members||[]).length;
  const each=Math.round(total/count*100)/100;
  svc.adminSplit=each;
  (svc.members||[]).forEach(m=>{ m.splitAmt=each; });
  save();
}
function setSplitMode(svcId,mode){
  const svc=data.services.find(x=>x.id===svcId);if(!svc)return;
  svc.splitMode=mode;
  if(mode==='equal') doEqualSplit(svc);
  save(); renderDetail();
}
function saveSplitCustom(svcId){
  const svc=data.services.find(x=>x.id===svcId);if(!svc)return;
  const adminInp=document.getElementById(`cs-admin-${svcId}`);
  if(adminInp) svc.adminSplit=parseFloat(adminInp.value)||0;
  (svc.members||[]).forEach(m=>{
    const inp=document.getElementById(`cs-m-${svcId}-${m.id}`);
    if(inp) m.splitAmt=parseFloat(inp.value)||0;
  });
  save(); renderDetail(); toast('✓ 分帳已儲存');
}
function liveTotal(svcId){
  const svc=data.services.find(x=>x.id===svcId);if(!svc)return;
  const monthly=monthlyAmt(svc);
  const adminV=parseFloat(document.getElementById(`cs-admin-${svcId}`)?.value)||0;
  let t=adminV;
  (svc.members||[]).forEach(m=>{t+=parseFloat(document.getElementById(`cs-m-${svcId}-${m.id}`)?.value)||0;});
  const diff=Math.round((t-monthly)*100)/100;
  const el=document.getElementById(`cs-total-${svcId}`);
  if(!el)return;
  const ok=Math.abs(diff)<0.02;
  el.style.color=ok?'var(--green)':diff>0?'var(--maple)':'var(--amber)';
  el.textContent=`加總 NT$${Math.round(t).toLocaleString()} ${ok?'✓ 等於總額':diff>0?`超出 ${diff.toFixed(0)}`:`不足 ${Math.abs(diff).toFixed(0)}`}`;
}

/* ═══════════════════ RENDER LIST ═══════════════════ */
function renderList(){
  const svcs=data.services;
  const totalM=svcs.reduce((s,x)=>s+myShare(x),0);
  document.getElementById('st-count').innerHTML  =`${svcs.length}<small> 項</small>`;
  document.getElementById('st-monthly').innerHTML=`${Math.round(totalM).toLocaleString()}<small> 元</small>`;
  document.getElementById('st-annual').innerHTML =`${Math.round(totalM*12).toLocaleString()}<small> 元</small>`;

  const list=document.getElementById('svc-list');
  if(!svcs.length){
    list.innerHTML=`<div class="empty"><div class="empty-art">🌱</div><p>尚未新增任何訂閱項目<br>點下方按鈕新增第一個</p></div>`;
    return;
  }
  list.innerHTML=svcs.map(svc=>{
    const isAdmin=svc.myRole!=='member';
    const ri=renewInfo(svc.renew);
    const monthly=myShare(svc);
    const isYearly=svc.adminCycle==='yearly';

    const members=svc.members||[];
    const paid  =members.filter(m=>m.paid==='paid');
    const unpaid=members.filter(m=>m.paid==='unpaid');

    const extra=allPips.length-visiblePips.length;
    const debtTotal=unpaid.reduce((s,m)=>s+Math.round(memberMonthly(svc,m)),0);

    const pipsHtml=members.length?`<div class="pip-row">
      ${visiblePips.map(m=>`<div class="pip ${m.paid==='paid'?'pip-paid':m.paid==='unpaid'?'pip-unpaid':'pip-none'}" title="${m.name}">${m.name.slice(0,1)}</div>`).join('')}
      ${extra>0?`<div class="pip pip-more">+${extra}</div>`:''}
    </div>`:`<div style="font-size:10px;color:var(--text-dim)">無成員</div>`;

    // tags: role + renew + debt
    const tagsHtml=`
      <span class="tag ${isAdmin?'tag-admin':'tag-member'}">${isAdmin?'管理員':'成員'}</span>
      ${ri.txt?`<span class="tag ${ri.cls}">${ri.txt}</span>`:''}
      ${isAdmin&&unpaid.length?`<span class="tag tag-debt">待收 NT$${debtTotal}</span>`:''}
    `;

    // amount display
    const amtDisplay=isYearly
      ?`<div class="slc-right">
          <div style="font-size:10px;color:var(--text-dim);margin-bottom:2px">年繳</div>
          <div class="slc-amt-row">
            <span class="slc-amt">NT$ ${Math.round(monthly*12).toLocaleString()}</span>
            <span class="slc-per">/年</span>
          </div>
          <div style="font-size:10px;color:var(--text-dim);margin-top:2px">${Math.round(monthly).toLocaleString()} 元/月</div>
        </div>`
      :`<div class="slc-right">
          <div class="slc-amt-row">
            <span class="slc-amt">NT$ ${Math.round(monthly).toLocaleString()}</span>
            <span class="slc-per">/月</span>
          </div>
        </div>`;

    return`<div class="svc-list-card ${isAdmin?'':'role-member'}" onclick="openDetail(${svc.id})">
      <div class="slc-top">
        <div class="slc-left">
          <div class="slc-emoji">${svc.emoji}</div>
          <div class="slc-title">
            <div class="slc-name">${svc.name}</div>
            <div class="slc-sub">${svc.adminCycle==='yearly'?'年繳':'月繳'} · 成員${svc.memberCycle==='yearly'?'年':'月'}繳${members.length?` · ${members.length}人`:''}${svc.note?' · '+svc.note:''}</div>
          </div>
        </div>
        ${amtDisplay}
      </div>
      <div class="slc-bottom">
        ${pipsHtml}
        <div class="tag-row">${tagsHtml}</div>
      </div>
    </div>`;
  }).join('');
}

/* ── Inline fin edit ── */
function inlineEditHeroPrice(svcId){
  const svc=data.services.find(x=>x.id===svcId);if(!svc)return;
  const el=document.getElementById(`hero-price-${svcId}`);if(!el)return;
  const cur=svc.price||'';
  const unit=svc.adminCycle==='yearly'?'/年':'/月';
  el.innerHTML=`NT$ <input class="fin-input" style="display:inline-block;width:90px;font-size:18px;border-bottom-color:var(--sage)" type="number" min="0" value="${cur}" id="hpi-${svcId}" onblur="saveHeroPrice(${svcId},this.value)" onkeydown="if(event.key==='Enter')this.blur()" autofocus><small>${unit}</small>`;
  const inp=document.getElementById(`hpi-${svcId}`);
  if(inp){inp.focus();inp.select();}
}
function saveHeroPrice(svcId,val){
  const svc=data.services.find(x=>x.id===svcId);if(!svc)return;
  svc.price=val;
  if(svc.splitMode==='equal') doEqualSplit(svc);
  else save();
  renderDetail();
}
function inlineEditFin(svcId,field){
  const svc=data.services.find(x=>x.id===svcId);if(!svc)return;
  const cell=document.getElementById(`fin-${field}-${svcId}`);if(!cell)return;
  const cur=svc[field]||'';
  const lbl=field==='price'?'訂閱總額 ✎':'我的分帳 ✎';
  cell.innerHTML=`<div class="fin-lbl">${lbl}</div><input class="fin-input" type="number" min="0" value="${cur}" id="fi-${svcId}-${field}" onblur="saveInlineFin(${svcId},'${field}',this.value)" onkeydown="if(event.key==='Enter')this.blur()" autofocus>`;
  document.getElementById(`fi-${svcId}-${field}`)?.focus();
}
function saveInlineFin(svcId,field,val){
  const svc=data.services.find(x=>x.id===svcId);if(!svc)return;
  svc[field]=val;
  if(svc.splitMode==='equal') doEqualSplit(svc);
  else save();
  renderDetail();
}

/* ── Copy msg ── */
function copyMsg(svcId,mId,btnEl){
  const svc=data.services.find(x=>x.id===svcId);
  const m=svc?.members.find(x=>x.id===mId);
  if(!svc||!m)return;
  const mAmt=Math.round(memberMonthly(svc,m));
  const d=daysUntil(m.renew);
  const msg=settings.msgTemplate
    .replace(/{name}/g,m.name).replace(/{service}/g,svc.name)
    .replace(/{monthly}/g,mAmt.toLocaleString()).replace(/{annual}/g,(mAmt*12).toLocaleString())
    .replace(/{renew}/g,m.renew?formatDate(m.renew):'（未設定）')
    .replace(/{days}/g,d!=null?d:'—');
  navigator.clipboard.writeText(msg).then(()=>{
    const orig=btnEl.textContent;
    btnEl.textContent='✓ 已複製';
    btnEl.style.borderColor='var(--meadow)';btnEl.style.color='var(--green)';
    setTimeout(()=>{btnEl.textContent=orig;btnEl.style.borderColor='';btnEl.style.color='';},2200);
    toast('訊息已複製 ✓');
  }).catch(()=>toast('複製失敗'));
}

/* ═══════════════════ INIT ═══════════════════ */
renderList();
</script>
